<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="style1.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
 <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <div class="main_box">
        <input type="checkbox" id="check"/>
        <div class="btn_one">
            <label for="check" >
                <i class="fa-solid fa-bars"></i>
            </label>

        </div>
        <div class="sidebar_menu">
            <div class="logo">
            <a href="#">RAVI RAJ</a>

            </div>
            <div class="btn_two">
                <label for="check" >
                    <i class="fa-solid fa-xmark"></i>
                </label>

            </div>
            <div class="menu">
                <ul>
                <li>
                    <i class="fa-solid fa-image"></i>
                    <a href="#">Gallery</a>
                </li>
                <li>
                    <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    <a href="#">Shortcuts</a>
                </li><li>
                    <i class="fa-solid fa-photo-film"></i>
                    <a href="#">Exhibits</a>
                </li><li>
                    <i class="fa-solid fa-calendar-day"></i>
                    <a href="#">Event</a>
                </li><li>
                    <i class="fa-solid fa-phone"></i>
                    <a href="#">contact</a>
                </li>
                <li>
                    <i class="fa-solid fa-comments"></i>
                    <a href="#">Feedback</a>
                </li>
                </ul>
                

            </div>
            <div class="social_media">
                <ul>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-youtube"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin"></i></a>

                </ul>

            </div>
            

        </div>

        <div class="gallery_section">
            <h2 class="gallery_title">Photo Gallery</h2>
            <div class="gallery_grid">
                <div class="gallery_item">
                    <img src="robert-shunev-mS1nlYbq1kA-unsplash.jpg" alt="Photo 1"/>
                    <div class="overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
                </div>
                <div class="gallery_item">
                    <img src="robert-shunev-mS1nlYbq1kA-unsplash.jpg" alt="Photo 2"/>
                    <div class="overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
                </div>
                <div class="gallery_item">
                    <img src="robert-shunev-mS1nlYbq1kA-unsplash.jpg" alt="Photo 3"/>
                    <div class="overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
                </div>
                <div class="gallery_item">
                    <img src="robert-shunev-mS1nlYbq1kA-unsplash.jpg" alt="Photo 4"/>
                    <div class="overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
                </div>
                <div class="gallery_item">
                    <img src="robert-shunev-mS1nlYbq1kA-unsplash.jpg" alt="Photo 5"/>
                    <div class="overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
                </div>
                <div class="gallery_item">
                    <img src="robert-shunev-mS1nlYbq1kA-unsplash.jpg" alt="Photo 6"/>
                    <div class="overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
